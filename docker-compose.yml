version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rafm
      POSTGRES_USER: rafm
      POSTGRES_PASSWORD: rafm
    ports:
      - "5432:5432"
    volumes:
      - rafm-db:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

volumes:
  rafm-db:
